<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Player</title>
</head>

<body>

<h1>My Media Player</h1>

<section>
  <h2>Now Playing: Sailing Away</h2>

  <audio controls aria-label="Audio player for Sailing Away">
    <source 
      src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" 
      type="audio/mpeg">
  </audio>
</section>

<section>
  <h2>Now Playing: JavaScript Map Method</h2>

  <video controls width="640" aria-label="Video explaining JavaScript map method">
    <source 
      src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" 
      type="video/mp4">

    <track 
      src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt"
      kind="subtitles"
      srclang="en"
      label="English">
  </video>
</section>

<section>
  <h2>Transcript</h2>

  <p>
    This video explains how the JavaScript map method works. It is used to loop through arrays 
    and return a new array, making data transformation easier and cleaner.
  </p>
</section>

</body>

</html>
